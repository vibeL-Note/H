<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#165DFF">
    <link rel="manifest" href="/manifest.json">
    <title>游戏活动日历</title>
    <style>
        /* 全局重置 & 基础变量（统一配色） */
        :root {
            --primary: #165DFF;
            --success: #00B42A;
            --warning: #FF7D00;
            --danger: #F53F3F;
            --gray-100: #F2F3F5;
            --gray-200: #E5E6EB;
            --gray-300: #C9CDD4;
            --gray-400: #86909C;
            --gray-500: #4E5969;
            --gray-600: #1D2129;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 16px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--gray-100);
            padding: 24px;
            color: var(--gray-600);
            line-height: 1.5;
        }

        /* 顶部筛选栏 - 极简胶囊样式 */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-tab {
            padding: 6px 16px;
            border-radius: var(--radius-lg);
            border: none;
            background-color: white;
            color: var(--gray-500);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .filter-tab.active {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .filter-tab:hover:not(.active) {
            background-color: var(--gray-100);
        }

        /* 功能按钮栏 - 扁平化极简设计 */
        .func-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            align-items: center;
        }

        .func-btn {
            padding: 8px 12px;
            border-radius: var(--radius-md);
            border: none;
            background-color: white;
            color: var(--gray-500);
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .func-btn.primary {
            background-color: var(--primary);
            color: white;
        }

        .func-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .func-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 活动卡片容器 - 网格布局+自适应 */
        .event-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        /* 活动卡片 - 极简卡片+柔和阴影 */
        .event-card {
            background-color: white;
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* 游戏标识色条（顶部细条，极简区分） */
        .event-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary);
        }

        .event-card.genshin::before { background-color: var(--success); }
        .event-card.hsr::before { background-color: var(--primary); }
        .event-card.arknights::before { background-color: var(--warning); }
        .event-card.other::before { background-color: var(--gray-400); }

        /* 卡片内部样式 - 极简排版 */
        .event-game {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 8px;
        }

        .event-title {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .event-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .event-meta-item {
            font-size: 12px;
            color: var(--gray-400);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .event-meta-item.remind {
            color: var(--danger);
        }

        .event-meta-item svg {
            width: 14px;
            height: 14px;
        }

        .event-actions {
            display: flex;
            gap: 16px;
            font-size: 12px;
        }

        .event-actions a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .event-actions a:hover {
            color: #0E42D2;
            text-decoration: underline;
        }

        /* 添加活动按钮 - 全屏宽度+极简设计 */
        .add-event-btn {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-md);
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .add-event-btn:hover {
            background-color: #0E42D2;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .add-event-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 空数据提示 - 极简居中 */
        .empty-tip {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
            font-size: 14px;
        }

        /* 响应式适配 - 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .event-container {
                grid-template-columns: 1fr;
            }

            .filter-bar, .func-bar {
                justify-content: flex-start;
            }

            .func-btn {
                padding: 6px 10px;
                font-size: 13px;
            }
        }

        /* 同步加载动画（极简旋转） */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <!-- 1. 顶部筛选标签（极简胶囊样式） -->
    <div class="filter-bar">
        <button class="filter-tab active" data-category="全部">全部</button>
        <button class="filter-tab" data-category="原神">原神</button>
        <button class="filter-tab" data-category="星穹铁道">星穹铁道</button>
        <button class="filter-tab" data-category="鸣潮">鸣潮</button>
        <button class="filter-tab" data-category="绝区零">绝区零</button>
        <button class="filter-tab" data-category="无限暖暖">无限暖暖</button>
        <button class="filter-tab" data-category="重返未来">重返未来</button>
        <button class="filter-tab" data-category="明日方舟">明日方舟</button>
        <button class="filter-tab" data-category="终末地">终末地</button>
    </div>

    <!-- 2. 功能按钮栏（扁平化极简） -->
    <div class="func-bar">
        <button class="func-btn" id="layout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            布局
        </button>
        <button class="func-btn primary" id="sync-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 0 1-9 9"></path>
                <path d="M21 12a9 9 0 0 0-9-9"></path>
                <path d="M3 12a9 9 0 0 1 9-9"></path>
                <path d="M3 12a9 9 0 0 0 9 9"></path>
            </svg>
            同步
        </button>
        <button class="func-btn" id="sort-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            按时间 ↓
        </button>
        <button class="func-btn" id="search-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            搜索
        </button>
        <button class="func-btn" id="export-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            导出
        </button>
    </div>

    <!-- 3. 活动卡片容器 -->
    <div class="event-container" id="event-container"></div>

    <!-- 4. 添加活动按钮（极简宽按钮） -->
    <button class="add-event-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        添加活动
    </button>

    <script>
        // 全局变量 & 游戏样式映射
        let allEvents = [];
        const gameStyleMap = {
            "原神": "genshin",
            "星穹铁道": "hsr",
            "明日方舟": "arknights",
            "鸣潮": "other",
            "绝区零": "other",
            "无限暖暖": "other",
            "重返未来": "other",
            "终末地": "other"
        };

        // 初始化
        window.onload = () => {
            loadEvents();
            bindFilterTabs();
            bindFuncBtns();
        };

        // 加载数据（合并本地+同步数据，去重）
        function loadEvents() {
            const localEvents = JSON.parse(localStorage.getItem('gameEvents') || '[]');
            
            fetch('data/events.json')
                .then(res => res.json())
                .then(syncEvents => {
                    const mergedEvents = mergeAndDeduplicate(localEvents, syncEvents);
                    allEvents = mergedEvents;
                    renderEvents(allEvents);
                    localStorage.setItem('gameEvents', JSON.stringify(mergedEvents));
                })
                .catch(err => {
                    console.error('加载同步数据失败：', err);
                    allEvents = localEvents;
                    renderEvents(allEvents);
                });
        }

        // 数据去重（按游戏+活动名唯一标识）
        function mergeAndDeduplicate(arr1, arr2) {
            const map = new Map();
            [...arr1, ...arr2].forEach(event => {
                const key = `${event.game || ''}-${event.name || ''}`;
                if (key) map.set(key, event);
            });
            return Array.from(map.values());
        }

        // 渲染活动卡片（极简模板）
        function renderEvents(events) {
            const container = document.getElementById('event-container');
            container.innerHTML = '';

            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-tip">
                        暂无活动数据<br>点击「添加活动」创建或「同步」获取最新数据
                    </div>
                `;
                return;
            }

            events.forEach(event => {
                const styleClass = gameStyleMap[event.game] || 'other';
                const cardHtml = `
                    <div class="event-card ${styleClass}">
                        <div class="event-game">${event.game || '未知游戏'}</div>
                        <div class="event-title">${event.name || '未命名活动'}</div>
                        <div class="event-meta">
                            <div class="event-meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                开始：${event.start || '未设置'}
                            </div>
                            <div class="event-meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                结束：${event.end || '未设置'}
                            </div>
                            <div class="event-meta-item remind">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                                提前${event.remind || 1}天提醒
                            </div>
                        </div>
                        <div class="event-actions">
                            <a href="javascript:editEvent('${event.game}-${event.name}')">修改</a>
                            <a href="javascript:deleteEvent('${event.game}-${event.name}')">删除</a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // 绑定分类筛选
        function bindFilterTabs() {
            const tabs = document.querySelectorAll('.filter-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    const category = tab.dataset.category;
                    const filteredEvents = category === '全部' 
                        ? allEvents 
                        : allEvents.filter(event => event.game === category);
                    
                    renderEvents(filteredEvents);
                });
            });
        }

        // 绑定功能按钮（布局/同步/排序/搜索/导出）
        function bindFuncBtns() {
            // 布局切换（卡片/列表）
            let isCardLayout = true;
            const layoutBtn = document.getElementById('layout-btn');
            const container = document.getElementById('event-container');
            
            layoutBtn.addEventListener('click', () => {
                isCardLayout = !isCardLayout;
                container.style.gridTemplateColumns = isCardLayout 
                    ? 'repeat(auto-fill, minmax(260px, 1fr))' 
                    : '1fr';
                
                layoutBtn.innerHTML = isCardLayout 
                    ? `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        布局
                      ` 
                    : `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="4" y1="6" x2="20" y2="6"></line>
                            <line x1="4" y1="12" x2="20" y2="12"></line>
                            <line x1="4" y1="18" x2="20" y2="18"></line>
                        </svg>
                        布局
                      `;
            });

            // 同步按钮
            const syncBtn = document.getElementById('sync-btn');
            syncBtn.addEventListener('click', () => {
                syncBtn.innerHTML = `
                    <svg class="animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 0 1-9 9"></path>
                        <path d="M21 12a9 9 0 0 0-9-9"></path>
                        <path d="M3 12a9 9 0 0 1 9-9"></path>
                        <path d="M3 12a9 9 0 0 0 9 9"></path>
                    </svg>
                    同步中...
                `;
                loadEvents();
                setTimeout(() => {
                    syncBtn.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 0 1-9 9"></path>
                            <path d="M21 12a9 9 0 0 0-9-9"></path>
                            <path d="M3 12a9 9 0 0 1 9-9"></path>
                            <path d="M3 12a9 9 0 0 0 9 9"></path>
                        </svg>
                        同步
                    `;
                    alert('同步完成！');
                }, 1000);
            });

            // 排序按钮
            let isAsc = true;
            const sortBtn = document.getElementById('sort-btn');
            sortBtn.addEventListener('click', () => {
                isAsc = !isAsc;
                allEvents.sort((a, b) => {
                    const timeA = new Date(a.start || '1970-01-01');
                    const timeB = new Date(b.start || '1970-01-01');
                    return isAsc ? timeA - timeB : timeB - timeA;
                });
                sortBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    按时间 ${isAsc ? '↓' : '↑'}
                `;
                renderEvents(allEvents);
            });

            // 搜索按钮
            document.getElementById('search-btn').addEventListener('click', () => {
                const keyword = prompt('请输入活动名称/游戏名搜索：');
                if (!keyword) return;
                const filteredEvents = allEvents.filter(event => 
                    (event.game || '').includes(keyword) || (event.name || '').includes(keyword)
                );
                renderEvents(filteredEvents);
            });

            // 导出按钮
            document.getElementById('export-btn').addEventListener('click', () => {
                const blob = new Blob([JSON.stringify(allEvents, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `游戏活动日历_${new Date().toLocaleDateString()}.json`;
                a.click();
                URL.revokeObjectURL(a.href);
            });
        }

        // 编辑/删除辅助函数
        function editEvent(key) {
            alert(`暂未实现修改功能，待开发（目标活动：${key}）`);
        }

        function deleteEvent(key) {
            if (confirm(`确定删除活动：${key}？`)) {
                allEvents = allEvents.filter(event => `${event.game}-${event.name}` !== key);
                localStorage.setItem('gameEvents', JSON.stringify(allEvents));
                renderEvents(allEvents);
            }
        }
    </script>
</body>
</html>
