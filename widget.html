<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏活动小组件</title>
  <style>
    body {
      margin: 0;
      padding: 8px;
      background: #f7f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      border-radius: 16px;
      overflow: hidden;
    }
    .widget-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .widget-title {
      font-size: 14px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 8px;
    }
    .widget-event {
      font-size: 12px;
      color: #666;
      margin: 4px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .widget-event .game {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 10px;
      margin-right: 6px;
      color: #fff;
    }
    .game.genshin { background: #52c41a; }
    .game.starrail { background: #fa8c16; }
    .game.Arknigs { background: #9e2120; }
  </style>
</head>
<body>
  <div class="widget-card">
    <div class="widget-title">📅 最近活动</div>
    <div id="widget-content">加载中...</div>
  </div>
  <script>
    // 从 events.json 加载数据并渲染到小组件
    fetch('/data/events.json')
      .then(res => res.json())
      .then(events => {
        const content = document.getElementById('widget-content');
        if (events.length === 0) {
          content.innerHTML = '<div class="widget-event">暂无活动</div>';
          return;
        }
        // 只显示最近3个活动
        const recent = events.slice(0, 3);
        content.innerHTML = recent.map(e => `
          <div class="widget-event">
            <span class="game ${getGameKey(e.game)}">${e.game}</span>
            ${e.name}
          </div>
        `).join('');
      })
      .catch(err => {
        document.getElementById('widget-content').innerHTML = '<div class="widget-event">加载失败</div>';
      });

    function getGameKey(name) {
      const map = {
        "原神": "genshin",
        "星穹铁道": "starrail",
        "明日方舟": "Arknigs"
      };
      return map[name] || "default";
    }
  </script>
</body>
</html>
