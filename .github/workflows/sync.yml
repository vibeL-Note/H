name: 同步游戏活动数据
on:
  # 每天凌晨2点自动同步
  schedule:
    - cron: '0 18 * * *'  # 对应北京时间凌晨2点（GitHub服务器是UTC时间）
  # 手动触发同步
  workflow_dispatch:

jobs:
  sync-events:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests json5 beautifulsoup4

      - name: 运行同步脚本
        run: |
          python scripts/sync_events.py  # 假设scripts里有同步脚本，若无则先创建

      - name: 提交并推送数据
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/events.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自动同步游戏活动数据 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
